<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="shortcuticon" type="image/x-icon" href="icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">
<link rel="icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>BEYチームDROW</title>
<link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&family=Noto+Sans+JP:wght@400;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root{--green:#39ff14;--green2:#00e676;--dark:#000;--card:#0d0d0d;--text:#e8ffe8;--muted:#3a5a3a;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:var(--dark);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100dvh;overflow:hidden;display:flex;align-items:center;justify-content:center;user-select:none;}
  .bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(57,255,20,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(57,255,20,.04) 1px,transparent 1px);background-size:40px 40px;}
  .bg-glow{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(57,255,20,.07) 0%,transparent 70%);transition:opacity .4s;}
  .bg-particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .particle{position:absolute;border-radius:50%;opacity:0;animation:drift linear infinite;}
  @keyframes drift{0%{transform:translateY(110vh) scale(0);opacity:0;}10%{opacity:.7;}90%{opacity:.7;}100%{transform:translateY(-10vh) scale(1.5);opacity:0;}}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .4s,transform .4s;padding:1.5rem;}
  .screen.hidden{opacity:0;pointer-events:none;transform:scale(.96);}
  .logo-wrap{filter:drop-shadow(0 0 18px rgba(57,255,20,.5));}
  .logo-wrap img{width:clamp(160px,60vw,280px);display:block;}

  /* SETUP */
  #setup-screen .logo-wrap{margin-bottom:1.8rem;}
  .input-wrap{background:var(--card);border:1px solid rgba(57,255,20,.22);border-radius:20px;padding:1.6rem;width:100%;max-width:360px;box-shadow:0 0 40px rgba(57,255,20,.07);}
  .input-wrap label{display:block;font-size:.78rem;color:var(--muted);margin-bottom:.6rem;letter-spacing:.12em;text-transform:uppercase;}
  .input-wrap input[type="number"]{width:100%;background:rgba(57,255,20,.05);border:1px solid rgba(57,255,20,.3);border-radius:12px;color:var(--green);font-family:'Dela Gothic One',sans-serif;font-size:2.8rem;text-align:center;padding:.4rem;outline:none;-webkit-appearance:textfield;appearance:textfield;text-shadow:0 0 20px rgba(57,255,20,.6);}
  .input-wrap input[type="number"]:focus{border-color:var(--green);box-shadow:0 0 18px rgba(57,255,20,.35);}
  .input-wrap input::-webkit-inner-spin-button{display:none;}
  .input-hint{text-align:center;font-size:.72rem;color:var(--muted);margin-top:.55rem;letter-spacing:.05em;}
  .start-btn{margin-top:1.4rem;width:100%;max-width:360px;padding:1.1rem;background:var(--green);border:none;border-radius:14px;font-family:'Dela Gothic One',sans-serif;font-size:1.25rem;color:#000;cursor:pointer;letter-spacing:.1em;box-shadow:0 4px 30px rgba(57,255,20,.5);transition:transform .15s;}
  .start-btn:active{transform:scale(.97);}

  /* READY */
  #ready-screen{background:#000;}
  #ready-screen .logo-wrap{margin-bottom:.6rem;}
  .range-badge{font-family:'Dela Gothic One',sans-serif;font-size:clamp(.9rem,4vw,1.3rem);color:var(--green2);margin-bottom:.4rem;letter-spacing:.08em;text-shadow:0 0 12px rgba(57,255,20,.5);transition:color .4s,text-shadow .4s;}
  .btn-area{position:relative;width:min(240px,64vw);height:min(240px,64vw);display:flex;align-items:center;justify-content:center;}
  .charge-ring{position:absolute;inset:-18px;pointer-events:none;}
  .charge-ring svg{width:100%;height:100%;}
  .pulse-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--green);opacity:0;pointer-events:none;animation:none;}
  @keyframes pulse-expand{0%{transform:scale(1);opacity:.8;}100%{transform:scale(1.9);opacity:0;}}
  .shoot-flash{position:fixed;inset:0;background:radial-gradient(circle,rgba(255,255,255,.95) 0%,rgba(57,255,20,.6) 40%,transparent 70%);opacity:0;pointer-events:none;z-index:49;}
  .shoot-overlay{position:fixed;inset:0;pointer-events:none;z-index:50;}
  .shoot-ray{position:absolute;top:50%;left:50%;height:3px;border-radius:2px;transform-origin:left center;opacity:0;}
  .shoot-particle{position:absolute;border-radius:50%;opacity:0;}
  .shockwave{position:absolute;inset:0;border-radius:50%;border:3px solid var(--green);opacity:0;pointer-events:none;}
  @keyframes shoot-flash-anim{0%{opacity:0;}10%{opacity:1;}100%{opacity:0;}}
  @keyframes ray-shoot{0%{opacity:.9;width:0;}60%{opacity:.9;}100%{opacity:0;width:var(--rlen);}}
  @keyframes particle-burst{0%{opacity:1;transform:translate(-50%,-50%);}100%{opacity:0;transform:translate(calc(-50% + var(--tx)),calc(-50% + var(--ty)));}}
  @keyframes shockwave{0%{transform:scale(.3);opacity:1;}100%{transform:scale(3.5);opacity:0;}}
  .lottery-btn{width:100%;height:100%;border-radius:50%;border:3px solid rgba(57,255,20,.4);position:relative;cursor:pointer;background:radial-gradient(circle at 35% 35%,#5fff3a 0%,#2ecc0c 40%,#1a7a05 100%);box-shadow:0 0 30px rgba(57,255,20,.35),0 6px 20px rgba(0,0,0,.6),inset 0 2px 8px rgba(255,255,255,.25),inset 0 -4px 10px rgba(0,0,0,.4);transition:transform .08s,box-shadow .08s,background .1s;touch-action:none;-webkit-touch-callout:none;}
  .btn-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:2;}
  .go-text{font-family:'Dela Gothic One',sans-serif;font-size:clamp(1.8rem,8vw,2.8rem);color:#000;letter-spacing:.05em;text-shadow:0 2px 4px rgba(0,0,0,.3);transition:opacity .15s,transform .15s;line-height:1;}
  .dots{font-family:'Dela Gothic One',sans-serif;font-size:clamp(.8rem,3vw,1.1rem);color:rgba(0,0,0,.55);letter-spacing:.3em;margin-top:.2rem;transition:opacity .15s;}
  .shoot-text{font-family:'Dela Gothic One',sans-serif;font-size:clamp(1.4rem,6vw,2.2rem);color:#fff;letter-spacing:.08em;text-shadow:0 0 20px #fff,0 0 40px var(--green);opacity:0;transform:scale(.5);transition:opacity .15s,transform .2s cubic-bezier(.175,.885,.32,1.8);position:absolute;}
  .lottery-btn.charging{transform:scale(.88);background:radial-gradient(circle at 35% 35%,#7fff50 0%,#39ff14 40%,#1fa000 100%);box-shadow:0 0 60px rgba(57,255,20,.9),0 0 120px rgba(57,255,20,.4),inset 0 2px 8px rgba(255,255,255,.3);border-color:var(--green);}
  .lottery-btn.charging .go-text{opacity:.6;transform:scale(.9);}
  .lottery-btn.charging .dots{opacity:0;}
  .lottery-btn.shooting{transform:scale(1.08);background:radial-gradient(circle at 35% 35%,#fff 0%,#a8ff7a 30%,#39ff14 70%);box-shadow:0 0 100px rgba(57,255,20,1),0 0 200px rgba(57,255,20,.6),inset 0 2px 8px rgba(255,255,255,.5);border-color:#fff;}
  .lottery-btn.shooting .go-text{opacity:0;transform:scale(.3);}
  .lottery-btn.shooting .dots{opacity:0;}
  .lottery-btn.shooting .shoot-text{opacity:1;transform:scale(1);}
  .hint{margin-top:1.8rem;font-family:'Dela Gothic One',sans-serif;font-size:clamp(1.2rem,4vw,1.2rem);color:var(--green2);letter-spacing:.08em;text-shadow:0 0 12px rgba(57,255,20,.5);}
  .score-display{position:relative;z-index:20;margin-top:.2rem;margin-bottom:2rem;font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1.6rem,7vw,2.4rem);color:var(--green);letter-spacing:.06em;text-shadow:0 0 16px rgba(57,255,20,.7);min-height:2.8rem;transition:color .15s,text-shadow .15s;}
  .score-display.over{color:#ff4040;text-shadow:0 0 16px rgba(255,40,40,.9),0 0 40px rgba(255,40,40,.5);animation:over-blink .6s ease-in-out infinite alternate;}
  @keyframes over-blink{from{opacity:1;transform:scale(1);}to{opacity:.8;transform:scale(1);}}

  /* RESULT */
  :root{
    --result-glow-color: 57,255,20;
    --result-glow-color-hex: #39ff14;
    --result-bg-color: #001a00;
  }
  #result-screen{background:#000;}
  #result-screen .inner{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;padding:.6rem .6rem 6rem;overflow-y:auto;-webkit-overflow-scrolling:touch;justify-content:flex-start;}
  #result-screen .inner.center-aligned{justify-content:center;}
  .result-bg{position:fixed;inset:0;z-index:0;transition:background .6s;}
  .result-scan{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(57,255,20,.015) 3px,rgba(57,255,20,.015) 4px);}
  .confetti-wrap{position:fixed;inset:0;z-index:1;pointer-events:none;}
  .conf{position:absolute;opacity:0;animation:fall 3s ease-in forwards;}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg) scale(.5);opacity:0;}}
  /* ロゴ：80%サイズ・下部配置 */
  .result-logo-sm{filter:drop-shadow(0 0 12px rgba(57,255,20,.5));margin-top:auto;padding-top:.8rem;}
  .result-logo-sm img{width:clamp(80px,29vw,128px);display:block;}

  /* トーナメント振り分けUI */
  /* アイコン：元の60%（clamp値をそれぞれ×0.6） */
  .tournament-icon{width:clamp(54px,19vw,84px);display:block;margin:2rem auto .5rem;filter:drop-shadow(0 0 20px rgba(var(--result-glow-color),0.8));animation:popIn .5s cubic-bezier(.175,.885,.32,1.6) .1s forwards;transform:scale(0);}
  .tournament-name{font-family:'Dela Gothic One',sans-serif;font-size:clamp(1.1rem,5vw,1.6rem);letter-spacing:.08em;color:#fff;text-shadow:0 0 18px rgba(var(--result-glow-color),1),0 0 40px rgba(var(--result-glow-color),.6);text-align:center;margin-bottom:.6rem;animation:fadeUp .5s ease .3s forwards;opacity:0;}
  /* 数字：元の2倍（clamp値をそれぞれ×2） */
  .result-number{font-family:'Dela Gothic One',sans-serif;font-size:clamp(7rem,34vw,14rem);line-height:1;color:#fff;text-shadow:0 0 30px rgba(var(--result-glow-color),1),0 0 60px rgba(var(--result-glow-color),.6);animation:popIn .5s cubic-bezier(.175,.885,.32,1.6) forwards;transform:scale(0);}
  .result-number-label{font-family:'Dela Gothic One',sans-serif;font-size:clamp(.9rem,4vw,1.2rem);color:rgba(var(--result-glow-color),0.9);letter-spacing:.2em;text-shadow:0 0 12px rgba(var(--result-glow-color),.7);animation:fadeUp .4s ease .2s forwards;opacity:0;margin-top:8rem;}
  .result-sub{font-size:clamp(.7rem,2.6vw,.85rem);color:rgba(255,255,255,.5);letter-spacing:.05em;margin-top:.5rem;margin-bottom:.5rem;animation:fadeUp .5s ease .3s forwards;opacity:0;}

  /* 全体グロウ用オーバーレイ */
  .result-glow-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;transition:box-shadow .6s,background .6s;}

  #bracket-container{display:none;}

  /* 下部ボタン */
  .result-actions{position:fixed;bottom:0;left:0;right:0;z-index:20;display:flex;gap:.6rem;padding:.8rem 1rem;background:linear-gradient(transparent,rgba(0,0,0,.95) 35%);}
  .btn-next{flex:3;padding:.85rem;background:rgba(57,255,20,.12);border:1px solid rgba(57,255,20,.35);border-radius:12px;font-family:'Dela Gothic One',sans-serif;font-size:1rem;color:var(--green);cursor:pointer;transition:background .2s,transform .1s;}
  .btn-next:active{background:rgba(57,255,20,.25);transform:scale(.97);}
  .btn-top{flex:1;padding:.85rem;background:rgba(255,100,100,.08);border:1px solid rgba(255,100,100,.25);border-radius:12px;font-family:'Dela Gothic One',sans-serif;font-size:.8rem;color:rgba(255,140,140,.8);cursor:pointer;transition:background .2s,transform .1s;}
  .btn-top:active{background:rgba(255,100,100,.18);transform:scale(.97);}

  /* モーダル */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
  .modal-overlay.show{opacity:1;pointer-events:all;}
  .modal-box{background:#0d0d0d;border:1px solid rgba(57,255,20,.18);border-radius:18px;padding:1.8rem 1.5rem;width:min(320px,88vw);}
  .modal-box p{font-size:.88rem;color:var(--text);line-height:1.75;text-align:center;margin-bottom:1.4rem;}
  .modal-btns{display:flex;gap:.7rem;}
  .modal-cancel{flex:1;padding:.8rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;font-family:'Dela Gothic One',sans-serif;font-size:.88rem;color:#777;cursor:pointer;}
  .modal-ok{flex:1;padding:.8rem;background:rgba(255,80,80,.14);border:1px solid rgba(255,80,80,.3);border-radius:10px;font-family:'Dela Gothic One',sans-serif;font-size:.88rem;color:#ff8888;cursor:pointer;}

  @keyframes fadeUp{from{transform:translateY(14px);opacity:0;}to{transform:translateY(0);opacity:1;}}
  @keyframes popIn{to{transform:scale(1);}}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow" id="bg-glow"></div>
<div class="bg-particles" id="particles"></div>

<!-- SETUP -->
<div class="screen" id="setup-screen">
  <div class="logo-wrap"><img id="logo-img" src="" alt="BEYMETX"></div>
  <div class="input-wrap">
    <label style="font-family:'Dela Gothic One',sans-serif;font-size:18px;letter-spacing:.08em;color:#fff;text-shadow:0 0 18px rgba(57,255,20,1),0 0 40px rgba(57,255,20,.6);text-align:center;margin-bottom:.6rem;display:block;">チーム数を入力してください</label>
    <input type="number" id="count-input" min="1" max="9999" value="4" inputmode="numeric">
  </div>
  <button class="start-btn" onclick="goNew()">START ▶</button>
</div>

<!-- READY -->
<div class="screen hidden" id="ready-screen">
  <div class="logo-wrap"><img id="logo-img2" src="" alt="BEYMETX"></div>
  <div class="score-display" id="score-display"></div>
  <div class="btn-area">
    <div class="charge-ring" id="charge-ring">
      <svg id="gauge-svg" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="pulse-ring" id="pulse-ring"></div>
    <button class="lottery-btn" id="lottery-btn">
      <div class="btn-label">
        <span class="go-text">GO...</span>
        <span class="shoot-text">SHOOT!!</span>
      </div>
    </button>
    <div class="shockwave" id="shockwave"></div>
  </div>
  <div class="shoot-flash" id="shoot-flash"></div>
  <div class="shoot-overlay" id="shoot-overlay"></div>
  <p class="hint">タイミングよく離せ！</p>
</div>

<!-- RESULT -->
<div class="screen hidden" id="result-screen">
  <div class="result-bg" id="result-bg"></div>
  <div class="result-glow-overlay" id="result-glow-overlay"></div>
  <div class="result-scan"></div>
  <div class="confetti-wrap" id="confetti-wrap"></div>
  <div class="inner" id="result-inner">
    <img id="tournament-icon" class="tournament-icon" src="" alt="">
    <div class="tournament-name" id="tournament-name"></div>
    <div class="result-number-label">チームNo.</div>
    <div class="result-number" id="result-num">0</div>
    <div id="bracket-container"></div>
    <div class="result-logo-sm"><img id="logo-img3" src="" alt="BEYMETX"></div>
  </div>
  <div class="result-actions">
    <button class="btn-next" id="btn-next" onclick="goReady()">次の抽選へ ▶</button>
    <button class="btn-top" onclick="confirmTop()">TOPへ</button>
  </div>
</div>

<!-- 確認モーダル -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-box">
    <p>現在の抽選状態はリセットされます<br>よろしいですか？</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">キャンセル</button>
      <button class="modal-ok" onclick="doResetTop()">リセットする</button>
    </div>
  </div>
</div>

<script>
const LOGO_SRC='logo.png';
['logo-img','logo-img2','logo-img3'].forEach(id=>document.getElementById(id).src=LOGO_SRC);

(function(){
  const wrap=document.getElementById('particles'),cols=['#39ff14','#00e676','#76ff03','#1de9b6','#ccff90'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');p.className='particle';
    const s=Math.random()*5+2;
    p.style.cssText=`width:${s}px;height:${s}px;background:${cols[i%cols.length]};left:${Math.random()*100}%;animation-duration:${Math.random()*8+6}s;animation-delay:${Math.random()*9}s;`;
    wrap.appendChild(p);
  }
})();

let totalCount=4, pool=[], drawn=[];

function initPool(){
  pool=Array.from({length:totalCount},(_,i)=>i+1);
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  drawn=[];
}
function selectCount(val,el){
  document.getElementById('count-input').value=val;
  document.querySelectorAll('.num-btn').forEach(b=>b.classList.remove('selected'));
  el.classList.add('selected');
}
function show(id){
  ['setup-screen','ready-screen','result-screen'].forEach(s=>document.getElementById(s).classList.toggle('hidden',s!==id));
}
function goNew(){pool=[];drawn=[];goReady();}
function goReady(){
  const v=parseInt(document.getElementById('count-input').value);
  if(!v||v<1)return;
  const isNew=(v!==totalCount||pool.length===0);
  totalCount=v; show('ready-screen'); resetBtn(); isLocked=false;
  if(isNew)initPool();
}
function confirmTop(){document.getElementById('modal-overlay').classList.add('show');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function doResetTop(){
  closeModal(); pool=[];drawn=[];totalCount=4;
  document.getElementById('count-input').value=4;
  show('setup-screen');
}

/* CHARGE UX */
const btn=document.getElementById('lottery-btn');
const chargeRing=document.getElementById('charge-ring');
const gaugeSvg=document.getElementById('gauge-svg');
const pulseRing=document.getElementById('pulse-ring');
const bgGlow=document.getElementById('bg-glow');
const shootFlash=document.getElementById('shoot-flash');
const shootOverlay=document.getElementById('shoot-overlay');
const shockwave=document.getElementById('shockwave');
const CHARGE_MAX=1200;
let chargeStart=null,chargeRAF=null,charged=false,isCharging=false,pulseInt=null,isLocked=false;

/* ── 放射状目盛りゲージ描画 ── */
const TICK_COUNT=36;   // 目盛り総数
const CX=130,CY=130,R_OUT=124,R_IN_SHORT=108,R_IN_LONG=100,R_TRACK=115;
const svgNS2='http://www.w3.org/2000/svg';

// 初期描画（暗い目盛り）
function buildGauge(){
  gaugeSvg.innerHTML='';
  // フィルター定義（初回から埋め込み）
  const defsInit=document.createElementNS(svgNS2,'defs');
  defsInit.innerHTML=`<filter id="tglow" x="-200%" y="-200%" width="500%" height="500%" filterUnits="userSpaceOnUse">
    <feGaussianBlur stdDeviation="2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>`;
  gaugeSvg.appendChild(defsInit);
  // 外周トラックリング
  const track=document.createElementNS(svgNS2,'circle');
  track.setAttribute('cx',CX);track.setAttribute('cy',CY);track.setAttribute('r',R_TRACK);
  track.setAttribute('fill','none');track.setAttribute('stroke','rgba(57,255,20,.08)');
  track.setAttribute('stroke-width','14');
  gaugeSvg.appendChild(track);
  // 目盛り
  for(let i=0;i<TICK_COUNT;i++){
    const angle=(i/TICK_COUNT)*360-90;
    const rad=angle*Math.PI/180;
    const isLong=i%3===0;
    const rIn=isLong?R_IN_LONG:R_IN_SHORT;
    const x1=CX+Math.cos(rad)*R_OUT;
    const y1=CY+Math.sin(rad)*R_OUT;
    const x2=CX+Math.cos(rad)*rIn;
    const y2=CY+Math.sin(rad)*rIn;
    const line=document.createElementNS(svgNS2,'line');
    line.setAttribute('x1',x1);line.setAttribute('y1',y1);
    line.setAttribute('x2',x2);line.setAttribute('y2',y2);
    line.setAttribute('stroke','rgba(57,255,20,.15)');
    line.setAttribute('stroke-width',isLong?'3':'1.5');
    line.setAttribute('stroke-linecap','round');
    line.id=`tick-${i}`;
    gaugeSvg.appendChild(line);
  }
}
buildGauge();

function updateGauge(p){
  const litCount=Math.floor(p*TICK_COUNT);
  const isMax=p>=1;
  for(let i=0;i<TICK_COUNT;i++){
    const el=document.getElementById(`tick-${i}`);
    if(!el)continue;
    const isLong=i%3===0;
    if(isMax){
      el.setAttribute('stroke','#fff');
      el.setAttribute('filter','url(#tglow)');
    } else if(i<litCount){
      // 点灯: 進捗に応じてシアン→グリーン
      const hue=i<litCount*0.5?'rgba(0,230,118,1)':'rgba(57,255,20,1)';
      el.setAttribute('stroke',hue);
      el.setAttribute('filter','url(#tglow)');
    } else {
      el.setAttribute('stroke','rgba(57,255,20,.15)');
      el.removeAttribute('filter');
    }
  }

}
updateGauge(0);

/* ── SHOOT!! 爆発エフェクト ── */
function triggerShootEffect(){
  // 1. フラッシュ
  shootFlash.style.animation='none';
  void shootFlash.offsetWidth;
  shootFlash.style.animation='shoot-flash-anim .6s ease-out forwards';

  // 2. ショックウェーブ x3
  [0,80,160].forEach(delay=>{
    const sw=document.createElement('div');
    sw.className='shockwave';
    sw.style.cssText=`animation:shockwave ${.5+delay/400}s ease-out ${delay}ms forwards;border-color:${delay===0?'#fff':'var(--green)'};border-width:${delay===0?'4px':'2px'};`;
    btn.parentElement.appendChild(sw);
    setTimeout(()=>sw.remove(),800+delay);
  });

  // 3. 放射レイ（16本）SVGで描画して0/90/180/270度も正しく表示
  const overlay=shootOverlay;
  overlay.innerHTML='';
  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  const colors=['#39ff14','#00e676','#fff','#76ff03','#1de9b6'];

  // SVGオーバーレイを作成
  const raySvg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  raySvg.style.cssText=`position:absolute;inset:0;width:100%;height:100%;pointer-events:none;overflow:visible;`;
  overlay.appendChild(raySvg);

  // SVG用のアニメーションstyleを追加（まだなければ）
  if(!document.getElementById('ray-svg-style')){
    const st=document.createElement('style');
    st.id='ray-svg-style';
    st.textContent=`
      @keyframes ray-svg-shoot{
        0%{stroke-dashoffset:var(--rlen);opacity:.9;}
        60%{opacity:.9;}
        100%{stroke-dashoffset:0;opacity:0;}
      }
    `;
    document.head.appendChild(st);
  }

  for(let i=0;i<16;i++){
    const angle=(i/16)*360;
    const rad=angle*Math.PI/180;
    const len=80+Math.random()*120;
    const color=colors[i%colors.length];
    const delay=Math.random()*80;
    const dur=.3+Math.random()*.25;

    // 終点座標を計算
    const ex=cx+Math.cos(rad)*len;
    const ey=cy+Math.sin(rad)*len;

    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',cx);
    line.setAttribute('y1',cy);
    line.setAttribute('x2',ex);
    line.setAttribute('y2',ey);
    line.setAttribute('stroke',color);
    line.setAttribute('stroke-width','3');
    line.setAttribute('stroke-linecap','round');
    line.setAttribute('stroke-dasharray',len);
    line.setAttribute('stroke-dashoffset',len);
    line.style.cssText=`
      --rlen:${len};
      filter:drop-shadow(0 0 4px ${color});
      animation:ray-svg-shoot ${dur}s ease-out ${delay}ms forwards;
    `;
    raySvg.appendChild(line);
  }

  // 4. パーティクル（24個）
  for(let i=0;i<24;i++){
    const angle=Math.random()*360;
    const dist=60+Math.random()*140;
    const tx=Math.cos(angle*Math.PI/180)*dist;
    const ty=Math.sin(angle*Math.PI/180)*dist;
    const size=4+Math.random()*8;
    const p=document.createElement('div');
    p.className='shoot-particle';
    p.style.cssText=`
      left:${cx}px;top:${cy}px;
      width:${size}px;height:${size}px;
      --tx:${tx}px;--ty:${ty}px;
      background:${colors[i%colors.length]};
      box-shadow:0 0 ${size*2}px ${colors[i%colors.length]};
      animation:particle-burst ${.4+Math.random()*.4}s ease-out ${Math.random()*100}ms forwards;
    `;
    overlay.appendChild(p);
  }

  // 5. SHOOT!! テキスト揺れ
  const st=btn.querySelector('.shoot-text');
  st.style.animation='none';
  void st.offsetWidth;
  st.style.textShadow='0 0 30px #fff,0 0 60px var(--green),0 0 100px var(--green)';
  st.style.fontSize='clamp(2rem,9vw,3.2rem)';
  setTimeout(()=>{ st.style.fontSize=''; st.style.textShadow=''; },400);

  setTimeout(()=>{ overlay.innerHTML=''; },700);
}

function resetBtn(){
  btn.classList.remove('charging','shooting');
  updateGauge(0);
  bgGlow.style.opacity='1';
  isCharging=false; charged=false;
  if(chargeRAF){cancelAnimationFrame(chargeRAF);chargeRAF=null;}
  clearInterval(pulseInt); pulseRing.style.animation='none';
  // スコアを0%で初期表示
  const sd=document.getElementById('score-display');
  if(sd){sd.textContent='0%';sd.classList.remove('over');sd.style.animation='';sd.style.color='#b8ffb8';sd.style.textShadow='none';}
}

/* スコア表示更新
   p      : 経過割合（1.0 = 100%）
   confirm: true = 離した瞬間の確定表示（色変化あり）
            false = 押下中のリアルタイム表示（数字のみ、色変化なし）
*/
function updateScoreDisplay(p, confirm=false){
  const sd=document.getElementById('score-display');
  if(!sd)return;
  const pct=Math.floor(p*100);

  if(confirm){
    // ── 確定表示：色・演出を適用 ──
    sd.style.animation='';
    if(pct>=101){
      sd.textContent='OVER...';
      sd.classList.add('over');
      sd.style.color='';
      sd.style.textShadow='';
    } else if(pct===100){
      sd.textContent='100%';
      sd.classList.remove('over');
      // ピンクと薄紫の間のグロウ
      sd.style.color='#e8aaff';
      sd.style.textShadow='0 0 14px rgba(220,140,255,1),0 0 35px rgba(200,100,255,.7),0 0 70px rgba(180,80,255,.4)';
    } else if(pct>=90){
      sd.textContent=pct+'%';
      sd.classList.remove('over');
      sd.style.color='#fff176';
      sd.style.textShadow='0 0 16px rgba(255,241,80,1),0 0 40px rgba(255,238,0,.6)';
    } else {
      sd.textContent=pct+'%';
      sd.classList.remove('over');
      sd.style.color='';
      sd.style.textShadow='';
    }
  } else {
    // ── 押下中：数字だけ更新、色はグリーンのまま固定 ──
    if(pct>=101){
      sd.textContent='OVER...';
      sd.classList.add('over');
    } else {
      sd.textContent=pct+'%';
      sd.classList.remove('over');
    }
    // 色・アニメーションは変えない
    sd.style.animation='';
    sd.style.color='#b8ffb8';
    sd.style.textShadow='none';
  }
}
function startCharge(e){
  e.preventDefault(); if(isCharging||isLocked)return;
  isCharging=true; charged=false; chargeStart=performance.now();
  // 押し始め：色リセットして0%表示
  const sd=document.getElementById('score-display');
  if(sd){sd.textContent='0%';sd.classList.remove('over');sd.style.animation='';sd.style.color='#b8ffb8';sd.style.textShadow='none';}
  btn.classList.add('charging');
  pulseInt=setInterval(()=>{pulseRing.style.animation='none';void pulseRing.offsetWidth;pulseRing.style.animation='pulse-expand .6s ease-out forwards';},350);
  function frame(now){
    if(!isCharging)return;
    const p=Math.min((now-chargeStart)/CHARGE_MAX,1);
    updateGauge(p);
    bgGlow.style.opacity=String(1+p*3);
    if(p>=1&&!charged){ charged=true; }
    // 押下中：色変化なしでリアルタイム数値更新
    const rawP=(now-chargeStart)/CHARGE_MAX;
    updateScoreDisplay(rawP, false);
    chargeRAF=requestAnimationFrame(frame);
  }
  chargeRAF=requestAnimationFrame(frame);
}
function releaseCharge(e){
  e.preventDefault(); if(!isCharging)return;
  const elapsed=performance.now()-chargeStart;
  isCharging=false; clearInterval(pulseInt);
  if(chargeRAF){cancelAnimationFrame(chargeRAF);chargeRAF=null;}
  const power=Math.min(elapsed/CHARGE_MAX,1);
  const rawPower=elapsed/CHARGE_MAX;
  if(power<0.05){resetBtn();return;}
  // スコア確定表示（色変化あり）
  updateScoreDisplay(rawPower, true);
  isLocked=true;
  btn.classList.remove('charging'); btn.classList.add('shooting'); bgGlow.style.opacity='6';
  triggerShootEffect();
  let burst=0;
  const bi=setInterval(()=>{pulseRing.style.animation='none';void pulseRing.offsetWidth;pulseRing.style.animation='pulse-expand .5s ease-out forwards';if(++burst>=3)clearInterval(bi);},120);
  setTimeout(()=>{
    if(pool.length===0){initPool();}
    const winner=pool.pop(); drawn.push(winner);
    showResult(winner);
  },1500);
}
btn.addEventListener('touchstart',startCharge,{passive:false});
btn.addEventListener('touchend',releaseCharge,{passive:false});
btn.addEventListener('touchcancel',releaseCharge,{passive:false});
btn.addEventListener('mousedown',startCharge);
btn.addEventListener('mouseup',releaseCharge);
btn.addEventListener('mouseleave',e=>{if(isCharging)releaseCharge(e);});

function getTournamentData(num) {
  const mod = num % 4;
  if (mod === 1) return TOURNAMENT_DATA[0];
  if (mod === 2) return TOURNAMENT_DATA[1];
  if (mod === 3) return TOURNAMENT_DATA[2];
  return TOURNAMENT_DATA[3]; // mod===0
}

function applyTournamentTheme(td) {
  const root = document.documentElement;
  root.style.setProperty('--result-glow-color', td.glowColor);
  root.style.setProperty('--result-glow-color-hex', td.glowHex);

  // 背景
  const bg = document.getElementById('result-bg');
  if (bg) bg.style.background = `radial-gradient(ellipse at 50% 30%, ${td.bgColor}, #000)`;

  // スキャンラインの色
  const scan = document.querySelector('.result-scan');
  if (scan) scan.style.background = `repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(${td.glowColor},.015) 3px,rgba(${td.glowColor},.015) 4px)`;

  // 全体グロウオーバーレイ
  const overlay = document.getElementById('result-glow-overlay');
  if (overlay) {
    overlay.style.boxShadow = `inset 0 0 120px rgba(${td.glowColor},.18), inset 0 0 300px rgba(${td.glowColor},.08)`;
    overlay.style.background = `radial-gradient(ellipse 80% 60% at 50% 50%, rgba(${td.glowColor},.06) 0%, transparent 70%)`;
  }

  // ボタンの色
  const btnNext = document.getElementById('btn-next');
  if (btnNext) {
    btnNext.style.background = `rgba(${td.glowColor},.12)`;
    btnNext.style.borderColor = `rgba(${td.glowColor},.35)`;
    btnNext.style.color = td.glowHex;
  }
}

function showResult(num){
  const td = getTournamentData(num);

  // アイコン画像
  const icon = document.getElementById('tournament-icon');
  icon.src = td.image;
  icon.style.animation = 'none';
  void icon.offsetWidth;
  icon.style.animation = 'popIn .5s cubic-bezier(.175,.885,.32,1.6) .1s forwards';

  // トーナメント名
  const tname = document.getElementById('tournament-name');
  tname.textContent = td.name;
  tname.style.animation = 'none';
  void tname.offsetWidth;
  tname.style.animation = 'fadeUp .5s ease .3s forwards';
  tname.style.opacity = '0';

  // 数字
  document.getElementById('result-num').textContent = num;

  // テーマ適用
  applyTournamentTheme(td);

  // コンフェッティ
  const wrap=document.getElementById('confetti-wrap'); wrap.innerHTML='';
  const cols = td.confetti;
  for(let i=0;i<80;i++){
    const c=document.createElement('div'); c.className='conf';
    c.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${cols[i%cols.length|0]};width:${Math.random()*10+4}px;height:${Math.random()*7+3}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-delay:${Math.random()*.6}s;animation-duration:${Math.random()*2+2}s;`;
    wrap.appendChild(c);
  }

  bgGlow.style.opacity='1';
  show('result-screen');

  const rn=document.getElementById('result-num');
  rn.style.animation='none'; void rn.offsetWidth; rn.style.animation='popIn .5s cubic-bezier(.175,.885,.32,1.6) forwards';

  const inner=document.querySelector('#result-screen .inner');
  inner.scrollTop=0;
  requestAnimationFrame(()=>{
    requestAnimationFrame(()=>{
      inner.classList.toggle('center-aligned', inner.scrollHeight <= inner.clientHeight);
    });
  });
}

/* ═══════════════════════════════════════════════════════════
   TOURNAMENT BRACKET — 参考画像に正確に準拠した収束線

   【左ブロック 収束線アルゴリズム】
   ラウンド r = 1, 2, ..., halfRounds

   縦線の位置:
     vx(r) = SW + STUB + (r-1)*STEP

   各ラウンドrでは (half >> r) 本の縦線を引く。
   縦線pが繋ぐY範囲: スロット(p*span) 〜 スロット(p*span + span - 1)
     span = 2^r

   縦線の上端Y・下端Y:
     r=1: スロットのcenY が直接上端・下端
     r>1: 前のラウンドのペア中点Y が上端・下端

   だから「各ラウンドの合流点Y」を配列で持ちながら処理する。

   線の描き方（各ペアp）:
     ① 上端から縦線まで横線  (prevX, topY) → (vx, topY)
     ② 下端から縦線まで横線  (prevX, botY) → (vx, botY)
     ③ 縦線                  (vx, topY)    → (vx, botY)
     ④ 縦線中点から次へ横線  (vx, midY)   → (nextX, midY)
        最終ラウンドは中央へ
   ═══════════════════════════════════════════════════════════ */
function renderBracket(currentNum){
  const container=document.getElementById('bracket-container');
  container.innerHTML='';

  const N=totalCount;
  let bs=1; while(bs<N)bs*=2;
  const half=bs/2;                    // 左ブロックのスロット数
  const halfRounds=Math.log2(half);   // 片側の収束ラウンド数

  /* ---- レイアウト定数 ---- */
  const SW  =38;  // スロット幅
  const SH  =20;  // スロット高
  const VG  = 6;  // スロット縦間隔
  const STUB=10;  // スロット端 → R1縦線 の横距離
  const STEP=15;  // ラウンド間の縦線ステップ

  const unitH =SH+VG;
  const totalH=half*unitH-VG;

  // 収束線の総横幅 = STUB + halfRounds*STEP
  // ただし最後のラウンドの縦線から中央への横線分は CG に含める
  const treeW=STUB+halfRounds*STEP;
  const CG   =16;  // 左最終縦線〜中央点〜右最終縦線の合計ギャップ

  const svgW=SW+treeW+CG+treeW+SW;

  const PAD=8;  // グロー効果のはみ出し対策パディング

  const svgNS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(svgNS,'svg');
  svg.setAttribute('viewBox',`${-PAD} ${-PAD} ${svgW+PAD*2} ${totalH+PAD*2}`);
  svg.setAttribute('preserveAspectRatio','xMidYMid meet');
  svg.classList.add('bracket-svg');

  const defs=document.createElementNS(svgNS,'defs');
  defs.innerHTML=`<filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="2.5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>`;
  svg.appendChild(defs);

  const drawnSet=new Set(drawn);

  // スロット i の上端Y・中心Y
  const topY=i=> i*unitH;
  const cenY=i=> i*unitH + SH/2;

  /* 線を描画（スロットより背面にくるよう defs直後に挿入） */
  function addLine(x1,y1,x2,y2){
    const l=document.createElementNS(svgNS,'line');
    l.setAttribute('x1',x1); l.setAttribute('y1',y1);
    l.setAttribute('x2',x2); l.setAttribute('y2',y2);
    l.setAttribute('stroke','rgba(57,255,20,.25)');
    l.setAttribute('stroke-width','1');
    svg.insertBefore(l,defs.nextSibling);
  }

  /* スロット描画 */
  function addSlot(x,y,seed,filled,isCur){
    const r=document.createElementNS(svgNS,'rect');
    r.setAttribute('x',x); r.setAttribute('y',y);
    r.setAttribute('width',SW); r.setAttribute('height',SH);
    r.setAttribute('rx',3);
    if(isCur){
      r.setAttribute('fill','rgba(57,255,20,.42)');
      r.setAttribute('stroke','#39ff14'); r.setAttribute('stroke-width','2');
      r.setAttribute('filter','url(#glow)');
    } else if(filled){
      r.setAttribute('fill','rgba(57,255,20,.15)');
      r.setAttribute('stroke','rgba(57,255,20,.45)'); r.setAttribute('stroke-width','1');
    } else {
      r.setAttribute('fill','rgba(57,255,20,.04)');
      r.setAttribute('stroke','rgba(57,255,20,.2)'); r.setAttribute('stroke-width','1');
    }
    svg.appendChild(r);

    const t=document.createElementNS(svgNS,'text');
    t.setAttribute('x',x+SW/2); t.setAttribute('y',y+SH/2+4);
    t.setAttribute('text-anchor','middle');
    t.setAttribute('font-family','Dela Gothic One,sans-serif');
    t.setAttribute('font-size',isCur?'12':'10');
    t.setAttribute('fill',isCur?'#fff': filled?'var(--green2)':'rgba(57,255,20,.38)');
    if(isCur) t.setAttribute('filter','url(#glow)');
    t.textContent=seed;
    svg.appendChild(t);
  }

  /* ────────────────────────────────────────────────────
     収束線描画（左ブロック）

     各ラウンドの「合流点Y配列」を持ち回りながら処理する。
     初期値: ラウンド0 = 各スロットの中心Y
  ──────────────────────────────────────────────────── */
  function drawTree(slotBaseX, direction){
    // direction: +1 = 左ブロック（右方向へ収束）
    //            -1 = 右ブロック（左方向へ収束）

    // 各スロットの中心Yリスト（ラウンド0の合流点Y）
    let prevMidYs=[];
    for(let i=0;i<half;i++) prevMidYs.push(cenY(i));

    for(let r=1; r<=halfRounds; r++){
      // この縦線のX
      const vx = slotBaseX + direction*(STUB + (r-1)*STEP);
      // 前ラウンドの端X（r=1はスロット端、r>1は前縦線）
      const prevX = slotBaseX + direction*(STUB + (r-2)*STEP);
      // 実際のprevXをスロット端にする（r=1のとき）
      const fromX = r===1 ? slotBaseX : prevX;

      const pairCount = half>>r;
      const nextMidYs=[];

      for(let p=0; p<pairCount; p++){
        const tY=prevMidYs[p*2];     // このペアの上の合流点Y
        const bY=prevMidYs[p*2+1];   // このペアの下の合流点Y
        const mY=(tY+bY)/2;          // この縦線の中点Y

        // ① 上の合流点 → 縦線 への横線
        addLine(fromX, tY, vx, tY);
        // ② 下の合流点 → 縦線 への横線
        addLine(fromX, bY, vx, bY);
        // ③ 縦線
        addLine(vx, tY, vx, bY);

        // ④ 縦線中点 → 次ラウンドまたは中央
        if(r < halfRounds){
          const nextVx = slotBaseX + direction*(STUB + r*STEP);
          addLine(vx, mY, nextVx, mY);
        } else {
          // 最終ラウンド: 中央X（svgW/2）まで横線
          addLine(vx, mY, svgW/2, mY);
        }

        nextMidYs.push(mY);
      }
      prevMidYs=nextMidYs;
    }
  }

  // 左ブロック: スロット右端X = SW、右方向(+1)へ収束
  drawTree(SW, +1);
  // 右ブロック: スロット左端X = svgW-SW、左方向(-1)へ収束
  drawTree(svgW-SW, -1);

  /* ---- スロット描画（線より前面） ---- */
  for(let i=0;i<half;i++){
    const seed=i+1;
    addSlot(0, topY(i), seed, drawnSet.has(seed), seed===currentNum);
  }
  for(let i=0;i<half;i++){
    const seed=half+i+1;
    addSlot(svgW-SW, topY(i), seed, drawnSet.has(seed), seed===currentNum);
  }

  container.appendChild(svg);
}
</script>
